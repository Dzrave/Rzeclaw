<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rzeclaw 办公室</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #1a1a2e;
      display: flex;
      flex-direction: row;
      min-height: 100vh;
      font-family: 'Courier New', monospace;
      color: #e5e7eb;
    }
    #main-stage {
      flex: 0 0 auto;
      padding: 20px;
    }
    #game-container {
      width: 1280px;
      height: 720px;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
      border: 4px solid #64477d;
      background: #2a2a45;
    }
    #game-container canvas {
      width: 100% !important;
      height: 100% !important;
      display: block;
    }
    #chat-panel {
      flex: 1 1 360px;
      min-width: 280px;
      max-width: 480px;
      display: flex;
      flex-direction: column;
      border-left: 2px solid #334155;
      background: #0f172a;
    }
    #chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 12px;
      font-size: 14px;
      line-height: 1.5;
    }
    #chat-messages .msg { margin-bottom: 10px; }
    #chat-messages .msg.user { color: #93c5fd; }
    #chat-messages .msg.assistant { color: #d1fae5; }
    #chat-input-row {
      display: flex;
      gap: 8px;
      padding: 12px;
      border-top: 1px solid #334155;
    }
    #chat-input {
      flex: 1;
      padding: 10px 12px;
      background: #1e293b;
      border: 2px solid #475569;
      border-radius: 6px;
      color: #f8fafc;
      font-family: inherit;
      font-size: 14px;
    }
    #chat-input:focus { outline: none; border-color: #64748b; }
    #chat-send {
      padding: 10px 16px;
      background: #3b82f6;
      border: none;
      border-radius: 6px;
      color: #fff;
      font-family: inherit;
      cursor: pointer;
    }
    #chat-send:hover { background: #2563eb; }
    #status-bar {
      padding: 6px 12px;
      font-size: 12px;
      color: #94a3b8;
      border-bottom: 1px solid #334155;
    }
    #toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      padding: 10px 20px;
      background: rgba(15, 23, 42, 0.95);
      border: 1px solid #475569;
      border-radius: 8px;
      font-size: 14px;
      color: #e2e8f0;
      z-index: 9999;
      opacity: 0;
      transition: opacity 0.25s ease;
      pointer-events: none;
    }
    #toast.show { opacity: 1; }
    #lang-bar { padding: 6px 12px; font-size: 12px; color: #94a3b8; border-bottom: 1px solid #334155; display: flex; gap: 8px; align-items: center; }
    #lang-bar button { padding: 4px 10px; background: #1e293b; border: 1px solid #475569; border-radius: 4px; color: #e5e7eb; cursor: pointer; font-family: inherit; }
    #lang-bar button.active { border-color: #3b82f6; color: #93c5fd; }
  </style>
</head>
<body>
  <div id="toast" aria-live="polite"></div>
  <div id="main-stage">
    <div id="game-container"></div>
  </div>
  <div id="chat-panel">
    <div id="lang-bar">
      <span style="margin-right:6px;">Language</span>
      <button type="button" id="lang-zh">中文</button>
      <button type="button" id="lang-en">EN</button>
      <button type="button" id="lang-ja">日本語</button>
    </div>
    <div id="status-bar">连接中…</div>
    <div id="memo-panel" style="padding:8px 12px;font-size:12px;color:#94a3b8;border-bottom:1px solid #334155;">
      <div id="memo-title" style="font-weight:bold;color:#e5e7eb;margin-bottom:4px;">昨日小记</div>
      <div id="memo-content">暂无</div>
    </div>
    <div id="blueprints-panel" style="padding:8px 12px;font-size:12px;border-bottom:1px solid #334155;">
      <button type="button" id="btn-blueprints" style="padding:6px 10px;background:#1e293b;border:1px solid #475569;border-radius:6px;color:#e5e7eb;cursor:pointer;font-family:inherit;">智能体图鉴</button>
      <ul id="blueprints-list" style="margin:8px 0 0 0;padding-left:20px;display:none;"></ul>
    </div>
    <div id="chat-messages"></div>
    <div id="chat-input-row">
      <input type="text" id="chat-input" placeholder="输入消息…" />
      <button type="button" id="chat-send">发送</button>
    </div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/phaser@3.70.0/dist/phaser.min.js"></script>
  <script src="i18n.js"></script>
  <script src="layout.js"></script>
  <script src="gateway.js"></script>
  <script src="game.js"></script>
  <script>
    window.updateStatusBar = function (keyOrText) {
      window._lastStatusKey = keyOrText;
      var el = document.getElementById('status-bar');
      if (!el) return;
      var text = (window.t && ['statusConnecting','statusConnected','statusDisconnected','statusError'].indexOf(keyOrText) !== -1) ? window.t(keyOrText) : keyOrText;
      el.textContent = text;
    };
    window.showToast = function (text) {
      var el = document.getElementById('toast');
      if (!el) return;
      el.textContent = text || '';
      el.classList.add('show');
      clearTimeout(window._toastTimer);
      window._toastTimer = setTimeout(function () { el.classList.remove('show'); }, 2200);
    };
    window.fetchMemo = function () {
      var memoEl = document.getElementById('memo-content');
      if (!memoEl || !window.Gateway || !window.Gateway.isConnected()) return;
      window.Gateway.request('memory.yesterdaySummary', {}).then(function (r) {
        if (r.result && r.result.success && r.result.memo) {
          memoEl.textContent = r.result.memo.slice(0, 200) + (r.result.memo.length > 200 ? '…' : '');
        } else if (r.result && r.result.success) {
          memoEl.textContent = window.t ? window.t('memoNone') : '暂无';
        }
      }).catch(function () {});
    };
    (function () {
      var langBar = document.getElementById('lang-bar');
      ['zh','en','ja'].forEach(function (lang) {
        var btn = document.getElementById('lang-' + lang);
        if (!btn) return;
        btn.addEventListener('click', function () {
          if (window.I18N) window.I18N.setLang(lang);
          if (langBar) {
            langBar.querySelectorAll('button').forEach(function (b) { b.classList.remove('active'); });
            btn.classList.add('active');
          }
        });
      });
      if (window.I18N) window.I18N.applyLang();
      var current = window.I18N && window.I18N.getLang();
      var activeBtn = document.getElementById('lang-' + (current || 'zh'));
      if (activeBtn && langBar) { langBar.querySelectorAll('button').forEach(function (b) { b.classList.remove('active'); }); activeBtn.classList.add('active'); }
    })();
    (function () {
      var btn = document.getElementById('btn-blueprints');
      var list = document.getElementById('blueprints-list');
      if (!btn || !list) return;
      btn.addEventListener('click', function () {
        if (list.style.display === 'none') {
          list.style.display = 'block';
          list.innerHTML = '';
          var t = window.t || function (k) { return k; };
          if (!window.Gateway || !window.Gateway.isConnected()) { list.innerHTML = '<li>' + t('notConnected') + '</li>'; return; }
          window.Gateway.request('agents.blueprints', {}).then(function (r) {
            if (r.result && r.result.blueprints && r.result.blueprints.length) {
              r.result.blueprints.forEach(function (b) { var li = document.createElement('li'); li.textContent = (b.name || b.id) + ' (' + b.id + ')'; list.appendChild(li); });
            } else { list.innerHTML = '<li>' + t('noBlueprint') + '</li>'; }
          }).catch(function () { list.innerHTML = '<li>' + t('requestFailed') + '</li>'; });
        } else { list.style.display = 'none'; }
      });
    })();
    (function () {
      var input = document.getElementById('chat-input');
      var sendBtn = document.getElementById('chat-send');
      var messages = document.getElementById('chat-messages');
      function appendMsg(role, content) {
        var div = document.createElement('div');
        div.className = 'msg ' + role;
        div.textContent = content;
        messages.appendChild(div);
        messages.scrollTop = messages.scrollHeight;
      }
      function send() {
        var text = (input && input.value && input.value.trim()) || '';
        if (!text || !window.Gateway || !window.Gateway.isConnected()) return;
        appendMsg('user', text);
        input.value = '';
        var req = window.Gateway.request('chat', { message: text, sessionId: 'main' });
        var reqId = req.id;
        window.Gateway.setOnStream(function (streamId, chunk) {
          if (streamId !== reqId) return;
          var last = messages.querySelector('.msg.assistant.streaming');
          if (last) last.textContent += chunk;
          else { var d = document.createElement('div'); d.className = 'msg assistant streaming'; d.textContent = chunk; messages.appendChild(d); }
          messages.scrollTop = messages.scrollHeight;
        });
        req.then(function (r) {
          var streaming = messages.querySelector('.msg.assistant.streaming');
          if (streaming) streaming.classList.remove('streaming');
          if (r.error) appendMsg('assistant', (window.t ? window.t('errorPrefix') : '错误: ') + (r.error.message || ''));
          else if (r.result && r.result.content) appendMsg('assistant', r.result.content);
        });
      }
      if (sendBtn) sendBtn.addEventListener('click', send);
      if (input) input.addEventListener('keydown', function (e) { if (e.key === 'Enter') send(); });
    })();
  </script>
</body>
</html>
